<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver App | Logistix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        .driver-layout { max-width: 600px; margin: 0 auto; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .mission-card { background: rgba(0, 242, 254, 0.1); border-left: 4px solid var(--primary); margin-bottom: 20px; }
        #route-map { height: 300px; width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid var(--card-border); z-index: 1;}
        .instruction-banner {
            background: linear-gradient(90deg, #f6ad55, #ed8936);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            display: none;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>

    <div class="driver-layout">
        <div class="top-bar">
            <h2 id="driver-name">Driver App</h2>
            <button class="btn-primary" style="width:auto; padding: 5px 15px;" onclick="logout()">Exit</button>
        </div>

        <div class="tabs" style="display:flex; gap:10px; margin-bottom: 20px;">
            <button class="btn-primary" id="btn-tab-active" style="flex:1;" onclick="switchDriverTab('active')">Active Route</button>
            <button class="btn-primary" id="btn-tab-completed" style="flex:1; background:rgba(255,255,255,0.1); color:var(--text-muted);" onclick="switchDriverTab('completed')">Completed Orders</button>
        </div>

        <div id="active-tab">
            <div id="instruction-banner" class="instruction-banner">
                ⚠️ Traffic ahead. Taking alternate route (+5 mins).
            </div>

            <div id="verification-overlay" class="glass-card" style="display:none; text-align:center; margin-bottom: 20px;">
                <h3>Vehicle Verification Required</h3>
                <p id="verification-msg">Please upload a photo of the vehicle's number plate to start.</p>
                <form id="verify-form" style="margin-top:15px;">
                    <input type="file" id="plate-image" accept="image/*" required style="margin-bottom:10px;">
                    <button type="submit" class="btn-primary" id="verify-btn">Upload & Scan (ML)</button>
                </form>
            </div>

            <div id="mission-container">
                <!-- Dynamically injected -->
                <p>Loading your assigned routes...</p>
            </div>

            <div style="position:relative;">
                <div id="route-map" style="display:none;"></div>
                <button id="fullscreen-btn" class="btn-primary" style="display:none; position:absolute; top:10px; right:10px; z-index:1000; padding:5px 10px; font-size:0.8rem; width:auto;" onclick="toggleFullscreen()">Fullscreen</button>
            </div>
            
            <div id="alert-container"></div>
        </div>

        <div id="completed-tab" style="display:none;">
            <div id="completed-container">
                <!-- Dynamically injected -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="../js/api.js"></script>
    <script src="../js/driver.js"></script>
</body>
</html>
